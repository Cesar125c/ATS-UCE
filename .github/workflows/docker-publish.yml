name: Build and Publish Docker Images

on:
  push:
    branches: [qa, main]
    tags:
      - "v*.*.*"
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push API and Frontend images
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag comes from main
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit that belongs to main."
            exit 1
          fi

      - name: Compute Docker tags
        id: docker_tags
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            ENVIRONMENT="prod"
            VERSION_TAG="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            ENVIRONMENT="prod"
            VERSION_TAG=""
          elif [ "${GITHUB_REF_NAME}" = "qa" ]; then
            ENVIRONMENT="qa"
            VERSION_TAG=""
          else
            echo "This workflow only publishes images from qa, main, or v*.*.* tags."
            exit 1
          fi

          API_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-api:${ENVIRONMENT}-latest"
          API_TAGS="${API_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-api:${ENVIRONMENT}-${SHORT_SHA}"

          FRONTEND_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-frontend:${ENVIRONMENT}-latest"
          FRONTEND_TAGS="${FRONTEND_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-frontend:${ENVIRONMENT}-${SHORT_SHA}"

          if [ -n "$VERSION_TAG" ]; then
            API_TAGS="${API_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-api:${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/ats-uce-frontend:${VERSION_TAG}"
          fi

          echo "api_tags=${API_TAGS}" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=${FRONTEND_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.docker_tags.outputs.api_tags }}
          cache-from: type=gha,scope=ats-uce-api
          cache-to: type=gha,mode=max,scope=ats-uce-api

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          tags: ${{ steps.docker_tags.outputs.frontend_tags }}
          cache-from: type=gha,scope=ats-uce-frontend
          cache-to: type=gha,mode=max,scope=ats-uce-frontend
