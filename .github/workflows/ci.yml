name: CI

on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

# This workflow validates the project before changes move between branches.
# It does not deploy anything; it only checks backend, frontend, lint, build, and tests.

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ats_uce
          POSTGRES_PASSWORD: ats_uce_secret
          POSTGRES_DB: ats_uce_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ats_uce -d ats_uce_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://ats_uce:ats_uce_secret@localhost:5432/ats_uce_dev
      APP_ENV: test
      CLERK_SECRET_KEY: sk_test_placeholder_for_ci
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true  # Cachea dependencias entre runs para acelerar el CI

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev
        # --frozen: usa exactamente el lock file, sin resolver versiones nuevas

      - name: Check backend formatting with Ruff
        run: uv run ruff format --check .

      - name: Run backend lint with Ruff
        run: uv run ruff check .

      - name: Apply migrations on the temporary database
        run: uv run alembic upgrade head

      - name: Run backend tests
        run: |
          uv run pytest \
            -v \
            --tb=short \
            --no-header \
            --color=yes \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:coverage-report
        # -v             → muestra cada test con su nombre y estado (PASSED/FAILED)
        # --tb=short     → traceback resumido: archivo, línea y assertion exacta
        # --color=yes    → output con colores en GitHub Actions
        # --cov          → mide cobertura de código
        # --cov-report=term-missing → muestra en el log qué líneas no tienen cobertura

      - name: Upload coverage report
        if: always()  # Sube el reporte aunque los tests fallen, para poder analizarlo
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage-report/
          retention-days: 7

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build