name: Deploy QA

on:
  push:
    branches: [qa]
  workflow_dispatch:

# This workflow deploys only the qa branch to the QA AWS EC2 instance.
# Host, user, project path, and SSH key are configured as GitHub Secrets.
# It runs automatically when a change reaches qa, and can also be run manually.
concurrency:
  group: deploy-qa
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to QA EC2
    runs-on: ubuntu-latest
    environment: qa
    timeout-minutes: 15
    steps:
      - name: Deploy to QA EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            # Enter the repository directory cloned on the QA instance.
            cd "${{ secrets.QA_PROJECT_PATH }}"
            
            # Update exactly the qa branch from GitHub.
            git fetch origin qa
            git checkout qa
            git pull --ff-only origin qa
            
            # Rebuild and start the AWS stack without using docker-compose.override.yml.
            FRONTEND_TARGET=production docker compose -f docker-compose.yml up -d --build --remove-orphans
            
            # Apply pending migrations after the API container is running.
            docker compose -f docker-compose.yml exec -T api python -m alembic upgrade head
            
            # Health check: verificar que la API responde antes de dar el deploy por exitoso.
            echo "Verificando que la API responde..."
            DEPLOY_SUCCESS=false
            
            for i in {1..5}; do
              echo "Intento $i de 5..."
              if curl -sf http://localhost:8000/api/v1/health; then
                echo "✅ La API está respondiendo correctamente."
                DEPLOY_SUCCESS=true
                break
              fi
              echo "Intento $i fallido, esperando 5s..."
              sleep 5
            done

            if [ "$DEPLOY_SUCCESS" = false ]; then
              echo "❌ La API no responde tras 5 intentos"
              exit 1
            fi
            
            # Limpiar imágenes sin usar para liberar espacio en disco.
            docker image prune -f
            
            # Show the final container state for deployment review.
            docker compose -f docker-compose.yml ps
            
            echo "✅ Deploy QA completado exitosamente"

      - name: Notify Email on success
        if: success()
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "${{ secrets.RESEND_FROM_EMAIL }}",
              "to": "${{ secrets.NOTIFY_TO_EMAIL }}",
              "subject": "✅ Deploy QA Exitoso - ATS-UCE",
              "html": "<h3>El despliegue en QA se completó con éxito</h3><p><strong>Desplegado por:</strong> ${{ github.actor }}</p><p><strong>Commit:</strong> ${{ github.event.head_commit.message }}</p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Ver detalles en GitHub</a></p>"
            }'

      - name: Notify Email on failure
        if: failure()
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "${{ secrets.RESEND_FROM_EMAIL }}",
              "to": "${{ secrets.NOTIFY_TO_EMAIL }}",
              "subject": "❌ Deploy QA FALLIDO - ATS-UCE",
              "html": "<h3>El despliegue en QA ha fallado</h3><p><strong>Disparado por:</strong> ${{ github.actor }}</p><p><strong>Commit:</strong> ${{ github.event.head_commit.message }}</p><p style=\"color:red;\"><strong>Revisa los logs inmediatamente para encontrar el error.</strong></p><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Ver Logs del Fallo</a></p>"
            }'
