# =============================================================================
# ATS-UCE Platform — Docker Compose (base)
# =============================================================================
# Uso:
#   docker compose up                        # desarrollo (con override)
#   FRONTEND_TARGET=production docker compose -f docker-compose.yml up -d  # QA/prod
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ats-uce-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-ats_uce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ats_uce_secret}
      POSTGRES_DB: ${DB_NAME:-ats_uce_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ats_uce} -d ${DB_NAME:-ats_uce_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: ats-uce-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-development}
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    container_name: ats-uce-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http'); h.get('http://127.0.0.1:5173/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: ats-uce-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
