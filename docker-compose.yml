services:
  postgres:
    image: postgres:16-alpine
    container_name: ats-uce-database
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-ats_uce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ats_uce_secret}
      POSTGRES_DB: ${DB_NAME:-ats_uce_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ats_uce} -d ${DB_NAME:-ats_uce_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: ats-uce-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-ats_uce}:${DB_PASSWORD:-ats_uce_secret}@postgres:5432/${DB_NAME:-ats_uce_dev}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/backend/app
      - ./backend/main.py:/backend/main.py
      - ./backend/config.py:/backend/config.py
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: ats-uce-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: ats-uce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres_data: