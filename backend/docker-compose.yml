services:
  db:
    image: postgres:16-alpine
    container_name: ats_uce_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats_uce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_uce_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ats_uce_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats_uce} -d ${POSTGRES_DB:-ats_uce_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ats_uce_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats_uce_api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ats_uce}:${POSTGRES_PASSWORD:-ats_uce_secret}@db:5432/${POSTGRES_DB:-ats_uce_dev}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      B2_APPLICATION_KEY_ID: ${B2_APPLICATION_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-uce-talentpath-cvs}
      B2_ENDPOINT_URL: ${B2_ENDPOINT_URL:-}
      B2_REGION: ${B2_REGION:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-talentpath@uce.edu.ec}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ats_uce_net

volumes:
  postgres_data:

networks:
  ats_uce_net:
