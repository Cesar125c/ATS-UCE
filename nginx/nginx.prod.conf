# =============================================================================
# Nginx Production Configuration — ATS-UCE Platform
# =============================================================================
# Usar con SSL montando certificados en el contenedor:
#
#   volumes:
#     - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
#     - /etc/ssl/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
#     - /etc/ssl/private/privkey.pem:/etc/ssl/private/privkey.pem:ro
#
# El frontend se sirve mediante `serve -s dist` dentro del contenedor frontend:5173.
# Nginx solo proxy-pasa — no sirve archivos estáticos directamente.
# =============================================================================

events {}

http {
    client_max_body_size 10M;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream frontend_upstream {
        server frontend:5173;
    }

    upstream api_upstream {
        server api:8000;
    }

    # ─────────────────────────────────────────────────────────
    # Server HTTP — redirige a HTTPS
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────────────
    # Server HTTPS
    # ─── Reemplazar server_name con el dominio real ─────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend (proxy a serve dentro del contenedor frontend)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend API
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://api_upstream/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://api_upstream/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://api_upstream/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
