# =============================================================================
# Nginx Configuration — ATS-UCE Platform
# =============================================================================
# Este archivo se usa SOLO EN PRODUCCIÓN cuando se despliega con Docker.
# En desarrollo local, el frontend (Vite) usa su proxy nativo configurado en
# vite.config.ts para redirigir /api/* → localhost:8000.
# =============================================================================

events {}

http {
    upstream frontend_upstream {
        server frontend:5173;
    }

    upstream backend_upstream {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ─────────────────────────────────────────────────────────────────
        # Frontend (React / Vite en modo producción)
        # Sirve el build estático o redirige al servidor de desarrollo.
        # ─────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Necesario para WebSocket (HMR de Vite en desarrollo)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─────────────────────────────────────────────────────────────────
        # Backend API (FastAPI)
        # Pasa todas las rutas /api/* directamente al backend.
        # El backend tiene el prefijo /api/v1 en su router.
        # ─────────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─────────────────────────────────────────────────────────────────
        # Documentación automática de FastAPI
        # ─────────────────────────────────────────────────────────────────
        location /docs {
            proxy_pass http://backend_upstream/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://backend_upstream/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
