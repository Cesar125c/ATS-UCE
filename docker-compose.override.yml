# =============================================================================
# Dev overrides — cargado automáticamente por `docker compose up`
# =============================================================================
# Agrega volúmenes para hot-reload y flags de desarrollo.
# Para QA/prod, usar: docker compose -f docker-compose.yml up -d
# =============================================================================

services:
  api:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/main.py:/app/main.py
      - ./backend/config.py:/app/config.py
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
